  <script src="https://cdn.tailwindcss.com"></script>

  <script>

      Fragment: React.Fragment,
      jsx: function(type, props, key) {
        var p = Object.assign({}, props);
        if (key !== undefined) p.key = key;
        var ch = p.children; delete p.children;
        return ch !== undefined ? React.createElement(type, p, ch) : React.createElement(type, p);
      },
      jsxs: function(type, props, key) {
        var p = Object.assign({}, props);
        if (key !== undefined) p.key = key;
        var ch = p.children; delete p.children;
        return ch !== undefined
          ? React.createElement.apply(null, [type, p].concat(ch))
          : React.createElement(type, p);
      },
    };
  </script>
  <script src="https://unpkg.com/@xyflow/react@12/dist/umd/index.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@xyflow/react@12/dist/style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; font-family: 'Inter', system-ui, sans-serif; }

    /* Design tokens */
    :root {
      --bg-base:    #060b14;
      --bg-surface: #0d1520;
      --bg-panel:   #111927;
      --bg-raised:  #192234;
      --bg-hover:   #1e2a3d;
      --border:     #1f2f45;
      --border-mid: #243045;
      --accent-green:  #22c55e;
      --accent-blue:   #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-amber:  #f59e0b;
      --text-primary:  #e2e8f0;
      --text-secondary:#7e96b4;
      --text-muted:    #4a6180;
      --mono: 'Fira Code', monospace;
    }

    body { background: var(--bg-base); color: var(--text-primary); }

    /* React Flow overrides */
    .react-flow__background { background: var(--bg-surface) !important; }
    .react-flow__controls { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.4); }
    .react-flow__controls button { background: var(--bg-panel); border-bottom: 1px solid var(--border); color: var(--text-secondary); transition: background 150ms, color 150ms; }
    .react-flow__controls button:hover { background: var(--bg-hover); color: var(--text-primary); }
    .react-flow__minimap { background: var(--bg-panel) !important; border: 1px solid var(--border); border-radius: 8px; }
    .react-flow__edge-path { stroke: var(--border-mid); }
    .react-flow__edge.selected .react-flow__edge-path { stroke: var(--accent-blue); }
    .react-flow__node { overflow: visible !important; }
    .react-flow__node:hover,
    .react-flow__node:focus-within { z-index: 1200 !important; }

    /* Nodes */
    .des-node {
      position: relative;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: filter 150ms;
      overflow: visible;
      z-index: 1;
    }
    .des-node:hover { filter: brightness(1.1); }
    .des-node-tooltip {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translate(-50%, 6px);
      min-width: 110px;
      max-width: 180px;
      padding: 8px 9px;
      border-radius: 8px;
      background: rgba(6, 11, 20, .97);
      border: 1px solid rgba(126, 150, 180, .2);
      box-shadow: 0 14px 36px rgba(0,0,0,.45);
      color: var(--text-primary);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 120ms ease, transform 120ms ease, visibility 120ms ease;
      z-index: 1300;
      text-align: left;
      white-space: nowrap;
    }
    .des-node-tooltip::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 100%;
      transform: translateX(-50%);
      border-width: 6px 5px 0 5px;
      border-style: solid;
      border-color: rgba(6, 11, 20, .97) transparent transparent transparent;
    }
    .des-node:hover .des-node-tooltip,
    .des-node:focus-within .des-node-tooltip {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, 0);
    }
    .des-node-tooltip-title {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .55px;
      font-weight: 700;

    .des-node-tooltip-row {
      font-size: 11px;
      line-height: 1.35;

      margin-top: 2px;

    .des-node-source {

      font-weight: 600;
      font-size: 12px;
      color: white;
      box-shadow: 0 0 20px rgba(249,115,22,.2), 0 4px 12px rgba(0,0,0,.4);

    .des-node-server {

    /* Toolbar inputs */

      background: var(--bg-raised);
      border: 1px solid var(--border-mid);
      border-radius: 6px;

      font-family: var(--mono);

      min-width: 68px;

      margin: 0;

    .tb-select {
      background: var(--bg-raised);
      border: 1px solid var(--border-mid);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 12px;
      padding: 4px 8px;
      outline: none;
      cursor: pointer;
    }
    .tb-select:disabled,
    .panel-input:disabled,
    .panel-select:disabled {
      opacity: .55;
      cursor: not-allowed;

    /* Panel inputs */
    .panel-input {
      width: 100%;
      background: var(--bg-raised);
      border: 1px solid var(--border-mid);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 13px;
      padding: 6px 10px;
      outline: none;
      transition: border-color 150ms;
      font-family: 'Inter', sans-serif;
    }
    .panel-input:focus { border-color: var(--accent-blue); }

      width: 100%;
      background: var(--bg-raised);
      border: 1px solid var(--border-mid);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 13px;
      padding: 6px 10px;
      outline: none;
      cursor: pointer;

      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;

    .panel-help {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: help;
      line-height: 1;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid rgba(96,165,250,.35);
      background: rgba(59,130,246,.14);
      color: #93c5fd;
      font-size: 10px;
      font-weight: 700;
      font-family: Georgia, serif;
      transition: background 150ms ease, border-color 150ms ease, color 150ms ease;
      flex-shrink: 0;

      line-height: 1.5;

    /* Divider */
    .tb-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Tab active indicator */
    .metrics-tab-active { color: var(--text-primary) !important; border-bottom: 2px solid var(--accent-blue); }

    /* Router info card */
    .router-info { background: rgba(59,130,246,.06); border: 1px solid rgba(59,130,246,.15); border-radius: 6px; padding: 8px 10px; font-size: 11px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; }

    /* Palette drag item */
    .palette-item {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg-raised); border: 1px solid var(--border-mid);
      border-radius: 8px; padding: 8px 10px;
      width: 100%; cursor: grab; user-select: none;
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
      transition: background 150ms, border-color 150ms, color 150ms;
    }
    .palette-item:hover { background: var(--bg-hover); border-color: var(--border); color: var(--text-primary); }
    .palette-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Theory error cells */
    .err-good   { color: #4ade80; }
    .err-warn   { color: #fbbf24; }
    .err-bad    { color: #f87171; }

    /* Util bar */
    .util-bar-track { width: 100%; background: var(--bg-surface); border-radius: 4px; height: 6px; overflow: hidden; }
    .util-bar-fill  { height: 6px; border-radius: 4px; transition: width 400ms ease, background 400ms ease; }

    /* Modal overlay */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal-card { background: var(--bg-panel); border: 1px solid var(--border-mid); border-radius: 14px; padding: 24px; width: 380px; box-shadow: 0 24px 64px rgba(0,0,0,.7); }

    /* Stat table row hover */
    .stat-row:hover { background: var(--bg-raised); }
  </style>

<script type="text/babel" data-presets="react">

const {

const HISTORY_LIMIT = 100;

// ── Queueing theory ──────────────────────────────────────────────────────────

function computeMMOneTheory(lambda, mu) {
  if (lambda >= mu) return null;
  const rho = lambda / mu;
  const W  = 1 / (mu - lambda);
  const Wq = rho / (mu - lambda);
  const L  = rho / (1 - rho);
  const Lq = rho * rho / (1 - rho);
  return { rho, W, Wq, L, Lq };
}

function erlangC(a, c) {
  let sum = 0, term = 1;
  for (let k = 1; k < c; k++) { term *= a / k; sum += term; }
  const Pc = (term * a / c) / (1 - a / c);
  return Pc / (sum + 1 + Pc);
}

function computeMMcTheory(lambda, mu, c) {
  if (lambda >= c * mu) return null;
  const a = lambda / mu, rho = a / c;
  const Pw = erlangC(a, c);
  const Wq = Pw / (c * mu - lambda);
  const W  = Wq + 1 / mu;
  return { rho, W, Wq, L: lambda * W, Lq: lambda * Wq };
}

// ── Custom nodes ─────────────────────────────────────────────────────────────

const ROUTER_BADGE = {
  round_robin:  { bg: 'rgba(139,92,246,.9)', label: 'RR' },
  class_based:  { bg: 'rgba(245,158,11,.9)', label: 'CB' },
};

const SCHEDULER_BADGE = {
  round_robin:     { bg: 'rgba(59,130,246,.9)', label: 'RR' },
  first_non_empty: { bg: 'rgba(245,158,11,.9)', label: 'FNE' },
  longest_queue:   { bg: 'rgba(34,197,94,.9)', label: 'LQ' },
};

const SERVER_QUEUE_POLICY_LABEL = {
  fifo: 'FIFO',
  fbfs: 'FBFS',
  lbfs: 'LBFS',
};

const EMPTY_POLICY_LIBRARY = {
  server_routing: [],
  server_queue: [],
  station_scheduling: [],
};

function compactPolicyLabel(label, fallback = 'Custom') {
  const text = String(label || fallback).toUpperCase();
  return text.length > 8 ? `${text.slice(0, 5)}...` : text;
}

function getPolicySelectValue(config, fallbackType) {
  if (config?.type === 'custom' && config.policy_id) return `custom:${config.policy_id}`;
  return config?.type || fallbackType;
}

function findPolicyById(policies, policyId) {
  return (policies || []).find(policy => policy.id === policyId) || null;
}

function formatPolicySummary(config, builtInLabels, builtInInfo, fallbackType, customKindLabel) {
  if (config?.type === 'custom') {
    return {
      label: config.label || 'Custom',
      detail: config.description || `${customKindLabel} from the uploaded policy library.`,
    };
  }
  const type = config?.type || fallbackType;
  return {
    label: builtInLabels[type] || type,
    detail: builtInInfo[type] || '',
  };
}

function NodeTooltip({ title, rows = [] }) {
  return (
    <div className="des-node-tooltip">
      <div className="des-node-tooltip-title">{title}</div>
      {rows.map(row => (
        <div key={row} className="des-node-tooltip-row">{row}</div>
      ))}
    </div>
  );
}

function isTextEditingElement(element) {
  if (!element) return false;
  if (element.isContentEditable) return true;
  if (typeof element.closest === 'function' && element.closest('[contenteditable="true"]')) return true;
  const tag = element.tagName?.toUpperCase();
  if (tag === 'TEXTAREA') return true;
  if (tag !== 'INPUT') return false;
  const type = String(element.type || '').toLowerCase();
  return !['button', 'checkbox', 'color', 'file', 'hidden', 'image', 'radio', 'range', 'reset', 'submit'].includes(type);
}

function cloneValue(value) {
  if (typeof structuredClone === 'function') return structuredClone(value);
  return JSON.parse(JSON.stringify(value));
}

function HelpTooltip({ text }) {
  return (
    <span className="panel-help" tabIndex={0}>
      <span aria-hidden="true">i</span>
      <span className="panel-help-bubble">{text}</span>
    </span>
  );
}

function SourceNode({ data, selected }) {
  return (
    <div className={`des-node des-node-source${selected ? ' des-node-selected' : ''}`}>
      <NodeTooltip
        title={data.label}
        rows={[
          `lambda=${data.arrival_rate}`,
          data.customer_class ? `class=${data.customer_class}` : 'class=none',
        ]}
      />
      <div style={{fontSize:9, opacity:.7, letterSpacing:.5, textTransform:'uppercase', marginBottom:2}}>SOURCE</div>
      <div style={{fontSize:12}}>{data.label}</div>
      <div style={{fontSize:9, opacity:.65, fontFamily:'var(--mono)', marginTop:1}}>λ={data.arrival_rate}</div>
      <Handle type="source" position={Position.Right} style={{background:'#f97316', border:'2px solid rgba(255,255,255,.4)', width:8, height:8}} />
    </div>
  );
}

function ServerNode({ data, selected }) {
  const badge = ROUTER_BADGE[data.router?.type];
  const queuePolicy = formatPolicySummary(
    data.queue_policy,
    SERVER_QUEUE_POLICY_LABEL,
    SERVER_QUEUE_POLICY_INFO,
    'fifo',
    'Server queue policy'
  );
  const queuePolicyLabel =
    data.queue_policy?.type === 'custom'
      ? compactPolicyLabel(data.queue_policy?.label)
      : queuePolicy.label;
  const routerLabel =
    data.router?.type === 'custom'
      ? compactPolicyLabel(data.router?.label)
      : (
          {
            probabilistic: 'PROB',
            round_robin: 'RR',
            class_based: 'CLASS',
          }[data.router?.type || 'probabilistic']
        );
  return (
    <div className={`des-node des-node-server${selected ? ' des-node-selected' : ''}`} style={{position:'relative'}}>
      <NodeTooltip
        title={data.label}
        rows={[
          `mu=${data.service_rate}`,
          `c=${data.c || 1}`,
          `Q=${queuePolicyLabel}`,
          `R=${routerLabel}`,
        ]}
      />

function defaultNodeData(type, id) {
  if (type === 'source') return { label: id, arrival_rate: 1.0, customer_class: '', next_node_id: '' };
  if (type === 'server') return { label: id, service_rate: 1.0, c: 1, router: { type: 'probabilistic' }, queue_policy: { type: 'fifo' } };
  if (type === 'buffer') return { label: id };
  if (type === 'station') return { label: id, service_rate: 1.0, c: 1, scheduler: { type: 'round_robin' } };
  return { label: id };
}

// ── Theoretical comparison ────────────────────────────────────────────────────

function TheoreticalComparison({ nodes, edges, stats }) {
  const statsMap = {};
  (stats || []).forEach(r => { statsMap[r.node_id] = r; });
  const sourceNodes = nodes.filter(n => n.type === 'source');
  const serverNodes = nodes.filter(n => n.type === 'server');
  const rows = [];

  serverNodes.forEach(srv => {
    const inEdges = edges.filter(e => e.target === srv.id);
    let lambda = null;
    if (sourceNodes.length === 1) {
      lambda = Number(sourceNodes[0].data.arrival_rate);
    } else if (inEdges.length > 0) {
      const direct = inEdges.map(e => nodes.find(n => n.id === e.source)).filter(n => n?.type === 'source');
      if (direct.length === inEdges.length) lambda = direct.reduce((s,n) => s + Number(n.data.arrival_rate), 0);
    }
    const mu = Number(srv.data.service_rate) || 1, c = Number(srv.data.c) || 1;
    const theory = lambda == null ? null : (c === 1 ? computeMMOneTheory(lambda, mu) : computeMMcTheory(lambda, mu, c));
    const sim = statsMap[srv.id];

    ['L','Lq','W','Wq'].forEach(metric => {
      const sv2  = sim ? sim[metric] : null;
      const th   = theory ? theory[metric] : null;
      const errPct = sv2 != null && th != null && th !== 0 ? Math.abs(sv2 - th) / th * 100 : null;
      const errCls = errPct == null ? '' : errPct < 10 ? 'err-good' : errPct < 30 ? 'err-warn' : 'err-bad';
      rows.push({ node: srv.id, metric, sv: sv2, th, errPct, errCls });
    });
  });

  if (rows.length === 0) {
    const hasExplicitScheduling = nodes.some(n => n.type === 'buffer' || n.type === 'station');
    return (
      <div style={{display:'flex', alignItems:'center', justifyContent:'center', height:'100%', color:'var(--text-muted)', fontSize:12, textAlign:'center', padding:'0 16px'}}>
        {hasExplicitScheduling
          ? 'No analytic comparison is available for explicit buffer/station scheduling models in this view.'
          : 'Add server nodes to see M/M/1 or M/M/c theoretical values.'}
      </div>
    );
  }

  return (
    <div style={{overflowX:'auto', height:'100%'}}>
      <table style={{width:'100%', borderCollapse:'collapse', fontSize:11}}>
        <thead>
          <tr style={{borderBottom:'1px solid var(--border)'}}>
            {['Node','Metric','Simulation','Theory','Error'].map(h => (
              <th key={h} style={{padding:'6px 10px', textAlign: h === 'Node' || h === 'Metric' ? 'left' : 'right', color:'var(--text-muted)', fontWeight:600, fontSize:10, letterSpacing:.5, textTransform:'uppercase'}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={i} className="stat-row" style={{borderBottom:'1px solid var(--border)'}}>
              <td style={{padding:'5px 10px', color:'var(--text-secondary)', fontFamily:'var(--mono)', fontSize:10}}>{r.node}</td>
              <td style={{padding:'5px 10px', fontWeight:600, color:'var(--text-primary)'}}>{r.metric}</td>
              <td style={{padding:'5px 10px', textAlign:'right', fontFamily:'var(--mono)'}}>{r.sv != null ? r.sv.toFixed(3) : '—'}</td>
              <td style={{padding:'5px 10px', textAlign:'right', fontFamily:'var(--mono)', color:'var(--text-secondary)'}}>{r.th != null ? r.th.toFixed(3) : '—'}</td>
              <td style={{padding:'5px 10px', textAlign:'right', fontFamily:'var(--mono)'}} className={r.errCls}>{r.errPct != null ? r.errPct.toFixed(1)+'%' : '—'}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function ClassMapEditor({ classMap, onChange, availableClasses = [], targetOptions = [] }) {
  const entries = Object.entries(classMap || {});
  const [newCls, setNewCls] = useState('');
  const [newTarget, setNewTarget] = useState(targetOptions[0] || '');
  const unusedClasses = availableClasses.filter(cls => !(cls in (classMap || {})));

  useEffect(() => {
    if (!targetOptions.includes(newTarget)) {
      setNewTarget(targetOptions[0] || '');
    }
  }, [newTarget, targetOptions]);

  return (
    <div style={{marginTop:6}}>
      <div style={{fontSize:10, color:'var(--text-muted)', marginBottom:6, textTransform:'uppercase', letterSpacing:.5, fontWeight:600}}>Class → Target</div>

        <div key={cls} style={{display:'flex', alignItems:'center', gap:4, marginBottom:4}}>
          <input className="panel-input" style={{flex:1, fontSize:11}} value={cls} readOnly />
          <span style={{color:'var(--text-muted)', fontSize:11, flexShrink:0}}>→</span>
          <select className="panel-select" style={{flex:1, fontSize:11}}
            value={tgt}
            onChange={e => onChange({ ...classMap, [cls]: e.target.value })}>
            {[...new Set([tgt, ...targetOptions].filter(Boolean))].map(target => (
              <option key={target} value={target}>{target}</option>
            ))}
          </select>
          <button onClick={() => { const m = {...classMap}; delete m[cls]; onChange(m); }}
            style={{background:'none', border:'none', color:'#f87171', cursor:'pointer', padding:'2px 4px', display:'flex', alignItems:'center'}} title="Remove">
            <Icons.X />
          </button>
        </div>
      ))}
      {unusedClasses.length > 0 && (
        <div style={{fontSize:10, color:'var(--text-muted)', margin:'8px 0 6px'}}>
          Suggested classes: {unusedClasses.join(', ')}
        </div>
      )}
      <div style={{display:'flex', alignItems:'center', gap:4, marginTop:4}}>
        <input list="known-routing-classes" placeholder="class" className="panel-input" style={{flex:1, fontSize:11}}
          value={newCls} onChange={e => setNewCls(e.target.value)} />
        <datalist id="known-routing-classes">
          {unusedClasses.map(cls => <option key={cls} value={cls} />)}
        </datalist>
        <select className="panel-select" style={{flex:1, fontSize:11}}
          value={newTarget}
          onChange={e => setNewTarget(e.target.value)}>
          {targetOptions.length === 0 ? (
            <option value="">No downstream targets</option>
          ) : (
            targetOptions.map(target => <option key={target} value={target}>{target}</option>)
          )}
        </select>
        <button onClick={() => {
          const cls = newCls.trim();
          if (cls && newTarget) {
            onChange({...classMap, [cls]: newTarget});
            setNewCls('');
          }
        }}
          style={{background:'none', border:'none', color:'var(--accent-green)', cursor:'pointer', padding:'2px 4px', display:'flex', alignItems:'center'}} title="Add">
          <Icons.Plus />
        </button>
      </div>
    </div>
  );
}

              onChange={e => {
                const value = e.target.value;
                if (value.startsWith('custom:')) {
                  const policyId = value.slice('custom:'.length);
                  const policy = findPolicyById(customPolicies.server_routing, policyId);
                  onUpdate({
                    ...data,
                    router: {
                      type: 'custom',
                      policy_id: policyId,
                      label: policy?.name || policyId,
                      description: policy?.description || '',
                    },
                  });
                  return;
                }
                onUpdate({ ...data, router: { type: value, class_map: data.router?.class_map, fallback: data.router?.fallback } });
              }}>
              <option value="probabilistic">Probabilistic (weighted)</option>
              <option value="round_robin">Round Robin</option>
              <option value="class_based">Class-Based</option>
              {(customPolicies.server_routing || []).length > 0 && (
                <optgroup label="Uploaded Policies">
                  {(customPolicies.server_routing || []).map(policy => (
                    <option key={policy.id} value={`custom:${policy.id}`}>{policy.name}</option>
                  ))}
                </optgroup>
              )}
            </select>
          </div>
          <div className="router-info">
            {!hasRoutingChoice
              ? routingPolicyDisabledReason
              : data.router?.type === 'custom'
              ? (selectedRouterPolicy?.description || `Uploaded downstream server routing policy from ${selectedRouterPolicy?.source_file || 'policy library'}.`)
              : ROUTER_INFO[data.router?.type || 'probabilistic']}
          </div>
          {hasRoutingChoice && data.router?.type === 'class_based' && missingClassRoutes.length > 0 && (
            <div style={{
              background:'rgba(245,158,11,.08)',
              border:'1px solid rgba(245,158,11,.2)',
              borderRadius:6,
              padding:'8px 10px',
              fontSize:11,
              color:'#fbbf24',
              lineHeight:1.5,
              marginBottom:10,
            }}>
              Missing routes for: {missingClassRoutes.join(', ')}
            </div>
          )}
          {hasRoutingChoice && data.router?.type === 'class_based' && (
            <>
              <ClassMapEditor
                classMap={data.router.class_map || {}}
                availableClasses={sourceClasses}
                targetOptions={downstreamTargets}
                onChange={m => onUpdate({ ...data, router: { type: 'class_based', class_map: m, fallback: data.router?.fallback } })}
              />
              <div style={{marginTop:10}}>
                <PanelLabel
                  label="Fallback Target"
                  help="Optional downstream node used when a customer's class is not listed in the class map."
                />
                <select
                  className="panel-select"
                  value={data.router?.fallback || ''}
                  onChange={e => onUpdate({
                    ...data,
                    router: {
                      type: 'class_based',
                      class_map: data.router?.class_map || {},
                      fallback: e.target.value || null,
                    },
                  })}
                >
                  <option value="">None</option>
                  {downstreamTargets.map(target => (
                    <option key={target} value={target}>{target}</option>
                  ))}
                </select>
              </div>
            </>
          )}
        </>}

        {nodeType === 'station' && <>
          <Field
            label="Service Rate (μ)"
            field="service_rate"
            inputType="number"
            extra={{step:0.1, min:0.01}}
            help="Per-worker service speed for this station. Larger μ means jobs pulled from buffers complete faster."
          />
          <Field
            label="Parallel Servers (c)"
            field="c"
            inputType="number"
            extra={{step:1, min:1}}
            help="How many jobs this station can process at the same time across its upstream buffers."
          />
          <div style={{marginBottom:6}}>
            <PanelLabel
              label="Scheduling Policy"
              help="Decides which connected upstream buffer gets service next when station capacity is available."
            />
            <select className="panel-select"
              value={getPolicySelectValue(data.scheduler, 'round_robin')}
              onChange={e => {
                const value = e.target.value;
                if (value.startsWith('custom:')) {
                  const policyId = value.slice('custom:'.length);
                  const policy = findPolicyById(customPolicies.station_scheduling, policyId);
                  onUpdate({
                    ...data,
                    scheduler: {
                      type: 'custom',
                      policy_id: policyId,
                      label: policy?.name || policyId,
                      description: policy?.description || '',
                    },
                  });
                  return;
                }
                onUpdate({ ...data, scheduler: { type: value } });
              }}>
              <option value="round_robin">Round Robin</option>
              <option value="first_non_empty">First Non-Empty</option>
              <option value="longest_queue">Longest Queue</option>
              {(customPolicies.station_scheduling || []).length > 0 && (
                <optgroup label="Uploaded Policies">
                  {(customPolicies.station_scheduling || []).map(policy => (
                    <option key={policy.id} value={`custom:${policy.id}`}>{policy.name}</option>
                  ))}
                </optgroup>
              )}
            </select>
          </div>
          <div className="router-info">
            {data.scheduler?.type === 'custom'
              ? (selectedSchedulerPolicy?.description || `Uploaded upstream station scheduler from ${selectedSchedulerPolicy?.source_file || 'policy library'}.`)
              : SCHEDULER_INFO[data.scheduler?.type || 'round_robin']}
          </div>
        </>}

        {nodeType === 'edge' && (
          <div style={{marginBottom:12}}>
            <PanelLabel
              label="Weight"
              help="Relative routing weight for this edge. Probabilistic routers use these weights to decide how often traffic follows each outgoing edge."
            />
            <input type="number" step="0.1" min="0.01" className="panel-input"
              value={data.weight ?? 1.0}
              onChange={e => onUpdate({ ...data, weight: Number(e.target.value) })} />
          </div>
        )}
      </fieldset>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────

const TABS = [
  { key:'live',   label:'Live',   Icon: Icons.Live  },
  { key:'stats',  label:'Stats',  Icon: Icons.Stats  },
  { key:'theory', label:'Theory', Icon: Icons.Theory },
  { key:'chart',  label:'Chart',  Icon: Icons.Chart  },
];

function App() {
  const [nodes, setNodes] = useState([]);
  const [edges, setEdges] = useState([]);
  const [selected, setSelected] = useState(null);
  const [isLocked, setIsLocked] = useState(false);
  const [until, setUntil] = useState(10000);
  const [status, setStatus] = useState('idle');
  const [simTime, setSimTime] = useState(0);
  const [eventCount, setEventCount] = useState(0);
  const [stats, setStats] = useState([]);
  const [sessionId, setSessionId] = useState(null);
  const [error, setError] = useState(null);
  const [defaultRouter, setDefaultRouter] = useState('probabilistic');
  const [warmUp, setWarmUp] = useState(0);
  const [showTemplateModal, setShowTemplateModal] = useState(false);
  const [showPolicyModal, setShowPolicyModal] = useState(false);
  const [streamInterval, setStreamInterval] = useState(0.5);
  const [metricsTab, setMetricsTab] = useState('live');
  const [servers, setServers] = useState({});
  const [buffers, setBuffers] = useState({});
  const [stations, setStations] = useState({});
  const [customPolicies, setCustomPolicies] = useState(EMPTY_POLICY_LIBRARY);
  const [policyUploadError, setPolicyUploadError] = useState(null);
  const [policyUploading, setPolicyUploading] = useState(false);
  const [canUndo, setCanUndo] = useState(false);
  const wsRef = useRef(null);
  const chartRef = useRef(null);
  const chartInstance = useRef(null);
  const historyRef = useRef([]);
  const dragSnapshotRef = useRef(false);
  const { screenToFlowPosition } = useReactFlow();

  const createSnapshot = useCallback((overrides = {}) => ({
    nodes: cloneValue(overrides.nodes ?? nodes),
    edges: cloneValue(overrides.edges ?? edges),
    selected: cloneValue(overrides.selected ?? selected),
    defaultRouter: overrides.defaultRouter ?? defaultRouter,
  }), [defaultRouter, edges, nodes, selected]);

  const pushHistorySnapshot = useCallback((snapshot = createSnapshot()) => {
    historyRef.current = [...historyRef.current, snapshot].slice(-HISTORY_LIMIT);
    setCanUndo(historyRef.current.length > 0);
  }, [createSnapshot]);

  const restoreSnapshot = useCallback(snapshot => {
    if (!snapshot) return;
    setNodes(cloneValue(snapshot.nodes || []));
    setEdges(cloneValue(snapshot.edges || []));
    setSelected(snapshot.selected ? cloneValue(snapshot.selected) : null);
    setDefaultRouter(snapshot.defaultRouter || 'probabilistic');
  }, []);

  const undoLastChange = useCallback(() => {
    if (isLocked || historyRef.current.length === 0) return;
    const snapshot = historyRef.current[historyRef.current.length - 1];
    const nextHistory = historyRef.current.slice(0, -1);
    historyRef.current = nextHistory;
    setCanUndo(nextHistory.length > 0);
    restoreSnapshot(snapshot);
  }, [isLocked, restoreSnapshot]);

  // Chart setup
  useEffect(() => {
    if (chartRef.current && !chartInstance.current) {
      chartInstance.current = new Chart(chartRef.current, {
        type: 'line',
        data: { labels: [], datasets: [] },
        options: {
          animation: false, responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#4a6180', font: { size: 10, family: 'Fira Code' } } } },
          scales: {
            x: { ticks: { color: '#4a6180', maxTicksLimit: 8, font: { size: 9 } }, grid: { color: '#1f2f45' } },
            y: { ticks: { color: '#4a6180', font: { size: 9 } }, grid: { color: '#1f2f45' } },
          },
        },
      });
    }
    return () => { if (chartInstance.current) { chartInstance.current.destroy(); chartInstance.current = null; } };
  }, []);

  const loadCustomPolicies = useCallback(async () => {
    try {
      const res = await fetch('/api/policies');
      if (!res.ok) throw new Error('Failed to load uploaded policies');
      const payload = await res.json();
      setCustomPolicies({
        server_routing: payload.server_routing || [],
        server_queue: payload.server_queue || [],
        station_scheduling: payload.station_scheduling || [],
      });
    } catch (e) {
      setPolicyUploadError(e.message);
    }
  }, []);

  useEffect(() => {
    loadCustomPolicies();
  }, [loadCustomPolicies]);

  const pushChartData = useCallback((state, statsArr) => {
    const chart = chartInstance.current;
    if (!chart) return;
    const label = state.sim_time.toFixed(1);
    const queueNodeIds = [...Object.keys(state.buffers || {}), ...Object.keys(state.servers || {})];
    const colors = ['#3b82f6','#22c55e','#f59e0b','#ec4899','#8b5cf6','#06b6d4'];
    if (chart.data.datasets.length === 0) {
      queueNodeIds.forEach((sid, i) => chart.data.datasets.push({
        label: sid, data: [], borderColor: colors[i % colors.length],
        borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: false,
      }));
    }
    chart.data.labels.push(label);
    if (chart.data.labels.length > 200) { chart.data.labels.shift(); chart.data.datasets.forEach(ds => ds.data.shift()); }
    queueNodeIds.forEach((sid, i) => {
      const queueLength = state.buffers?.[sid]?.queue_length ?? state.servers?.[sid]?.queue_length ?? 0;
      if (chart.data.datasets[i]) chart.data.datasets[i].data.push(queueLength);
    });
    chart.update('none');
  }, []);

  const loadTemplate = useCallback((t) => {
    if (!t) { setShowTemplateModal(false); return; }
    pushHistorySnapshot();
    setNodes(t.nodes); setEdges(t.edges);
    setDefaultRouter(t.defaultRouter || 'probabilistic');
    setWarmUp(t.warmUp);
    if (t.selectedNodeId) {
      const selectedNode = t.nodes.find(n => n.id === t.selectedNodeId);
      setSelected(selectedNode ? { type: selectedNode.type, id: selectedNode.id, data: { ...selectedNode.data } } : null);
    } else {
      setSelected(null);
    }
    setShowTemplateModal(false);
  }, [pushHistorySnapshot]);

  const uploadPolicy = useCallback(async file => {
    setPolicyUploadError(null);
    setPolicyUploading(true);
    try {
      const body = new FormData();
      body.append('file', file);
      const res = await fetch('/api/policies/upload', { method: 'POST', body });
      if (!res.ok) {
        const payload = await res.json();
        throw new Error(payload.detail || res.statusText);
      }
      await loadCustomPolicies();
    } catch (e) {
      setPolicyUploadError(e.message);
    } finally {
      setPolicyUploading(false);
    }
  }, [loadCustomPolicies]);

  const onDragOver = useCallback(e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }, []);
  const onDrop = useCallback(e => {
    e.preventDefault();
    if (isLocked) return;
    const type = e.dataTransfer.getData('application/reactflow-type');
    if (!type) return;
    pushHistorySnapshot();
    const position = screenToFlowPosition({ x: e.clientX, y: e.clientY });
    const id = newId(
      type === 'source' ? 'src' :
      type === 'server' ? 'srv' :
      type === 'buffer' ? 'buf' :
      type === 'station' ? 'stn' : 'sink'
    );
    setNodes(nds => [...nds, { id, type, position, data: defaultNodeData(type, id) }]);
  }, [isLocked, pushHistorySnapshot, screenToFlowPosition]);

  const onConnect = useCallback(params => {
    if (isLocked) return;
    pushHistorySnapshot();
    setEdges(eds => addEdge({
      ...params, label: '1.0', data: { weight: 1.0 },
      markerEnd: { type: MarkerType.ArrowClosed, color: '#334155' },
      style: { stroke: '#334155', strokeWidth: 2 },
    }, eds));
  }, [isLocked, pushHistorySnapshot]);

  const onNodesChange = useCallback(changes => {
    setNodes(nds => applyNodeChanges(changes, nds));
  }, []);

  const onEdgesChange = useCallback(changes => {
    setEdges(eds => applyEdgeChanges(changes, eds));
  }, []);

  const onNodeClick = useCallback((_, node) => setSelected({ type: node.type, id: node.id, data: { ...node.data } }), []);
  const onEdgeClick = useCallback((_, edge) => setSelected({ type: 'edge', id: edge.id, data: { weight: edge.data?.weight ?? 1.0 } }), []);
  const onPaneClick = useCallback(() => setSelected(null), []);

  const updateSelected = useCallback(newData => {
    if (isLocked) return;
    pushHistorySnapshot();
    setSelected(s => s ? { ...s, data: newData } : s);
    if (selected?.type === 'edge') {
      setEdges(eds => eds.map(e => e.id === selected.id ? { ...e, data: { weight: newData.weight }, label: String(newData.weight) } : e));
    } else {
      setNodes(nds => nds.map(n => n.id === selected?.id ? { ...n, data: newData } : n));
    }
  }, [isLocked, pushHistorySnapshot, selected]);

  const deleteSelected = useCallback(() => {
    if (!selected || isLocked) return;
    pushHistorySnapshot();
    if (selected.type === 'edge') {
      setEdges(eds => eds.filter(edge => edge.id !== selected.id));
    } else {
      setNodes(nds => nds.filter(node => node.id !== selected.id));
      setEdges(eds => eds.filter(edge => edge.source !== selected.id && edge.target !== selected.id));
    }
    setSelected(null);
  }, [isLocked, pushHistorySnapshot, selected]);

  const onNodeDragStart = useCallback(() => {
    if (isLocked || dragSnapshotRef.current) return;
    pushHistorySnapshot();
    dragSnapshotRef.current = true;
  }, [isLocked, pushHistorySnapshot]);

  const onNodeDragStop = useCallback(() => {
    dragSnapshotRef.current = false;
  }, []);

  useEffect(() => {
    if (!selected) return;
    if (selected.type === 'edge') {
      if (!edges.some(edge => edge.id === selected.id)) setSelected(null);
      return;
    }
    if (!nodes.some(node => node.id === selected.id)) setSelected(null);
  }, [selected, nodes, edges]);

  useEffect(() => {
    const onKeyDown = event => {
      const isEditingText = isTextEditingElement(event.target) || isTextEditingElement(document.activeElement);
      if ((event.metaKey || event.ctrlKey) && !event.altKey && event.key.toLowerCase() === 'z') {
        if (isEditingText || isLocked || historyRef.current.length === 0) return;
        event.preventDefault();
        undoLastChange();
        return;
      }
      if (!selected || isLocked) return;
      if (event.metaKey || event.ctrlKey || event.altKey) return;
      if (event.key !== 'Backspace' && event.key !== 'Delete') return;
      if (isEditingText) return;
      event.preventDefault();
      deleteSelected();
    };
    window.addEventListener('keydown', onKeyDown);
    return () => window.removeEventListener('keydown', onKeyDown);
  }, [deleteSelected, isLocked, selected, undoLastChange]);

  const toolbarRouter = selected?.type === 'server'
    ? (selected.data.router?.type || 'probabilistic')
    : defaultRouter;
  const selectedServerTargets = selected?.type === 'server'
    ? [...new Set(
        edges
          .filter(edge => edge.source === selected.id)
          .map(edge => edge.target)
          .filter(Boolean)
      )]
    : [];
  const selectedServerHasRoutingChoice = selected?.type === 'server'
    ? selectedServerTargets.length > 1
    : true;
  const toolbarRouterDisabled = isLocked || !selectedServerHasRoutingChoice;
  const toolbarRouterTitle = selected?.type === 'server' && !selectedServerHasRoutingChoice
    ? (selectedServerTargets.length === 0
        ? 'Routing policy is unavailable until this server has downstream connections.'
        : 'Routing policy is disabled because this server has only one outgoing edge.')
    : undefined;

  const handleToolbarRouterChange = useCallback(e => {
    const type = e.target.value;
    if (selected?.type === 'server') {
      updateSelected({
        ...selected.data,
        router: {
          type,
          class_map: type === 'class_based' ? (selected.data.router?.class_map || {}) : selected.data.router?.class_map,
          fallback: selected.data.router?.fallback,
        },
      });
      return;
    }
    if (type === defaultRouter) return;
    pushHistorySnapshot();
    setDefaultRouter(type);
  }, [defaultRouter, pushHistorySnapshot, selected, updateSelected]);

  const buildConfig = useCallback(() => {
    const nodeList = nodes.map(n => {
      const d = n.data, base = { id: n.id, type: n.type };
      if (n.type === 'source') {
        const next = d.next_node_id || edges.find(e => e.source === n.id)?.target || null;
        return { ...base, arrival_rate: Number(d.arrival_rate), customer_class: d.customer_class || null, next_node_id: next };
      }
      if (n.type === 'server') {
        const node = { ...base, service_rate: Number(d.service_rate), c: Number(d.c) || 1 };
        if (d.queue_policy?.type === 'custom' && d.queue_policy.policy_id) {
          node.queue_policy = { type: 'custom', policy_id: d.queue_policy.policy_id };
        } else if (d.queue_policy && d.queue_policy.type !== 'fifo') {
          node.queue_policy = { type: d.queue_policy.type };
        }
        if (d.router?.type === 'custom' && d.router.policy_id) {
          node.router = { type: 'custom', policy_id: d.router.policy_id };
        } else if (d.router && d.router.type !== 'probabilistic') {
          node.router = d.router;
        }
        return node;
      }
      if (n.type === 'station') {
        const node = { ...base, service_rate: Number(d.service_rate), c: Number(d.c) || 1 };
        if (d.scheduler?.type === 'custom' && d.scheduler.policy_id) {
          node.scheduler = { type: 'custom', policy_id: d.scheduler.policy_id };
        } else if (d.scheduler && d.scheduler.type !== 'round_robin') {
          node.scheduler = { type: d.scheduler.type };
        }
        return node;
      }
      return base;
    });
    return { warm_up_time: Number(warmUp), nodes: nodeList, edges: edges.map(e => ({ source: e.source, target: e.target, weight: e.data?.weight ?? 1.0 })), default_router: { type: defaultRouter } };
  }, [nodes, edges, warmUp, defaultRouter]);

  const validateGraph = useCallback(() => {
    const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
    const successors = {};
    const predecessors = {};
    edges.forEach(e => {
      successors[e.source] = [...(successors[e.source] || []), e.target];
      predecessors[e.target] = [...(predecessors[e.target] || []), e.source];
    });

    for (const node of nodes) {
      if (node.type === 'buffer') {
        const invalid = (successors[node.id] || []).filter(id => nodeMap[id]?.type !== 'station');
        if (invalid.length) return `Buffer '${node.id}' may only connect to station nodes.`;
      }
      if (node.type === 'station') {
        const preds = predecessors[node.id] || [];
        if (preds.length === 0) return `Station '${node.id}' must have at least one incoming buffer.`;
        const invalidPreds = preds.filter(id => nodeMap[id]?.type !== 'buffer');
        if (invalidPreds.length) return `Station '${node.id}' may only receive work from buffer nodes.`;
        const succs = successors[node.id] || [];
        if (succs.length !== 1) return `Station '${node.id}' must have exactly one outgoing edge.`;
        const invalidSuccs = succs.filter(id => !['buffer', 'sink', 'server'].includes(nodeMap[id]?.type));
        if (invalidSuccs.length) return `Station '${node.id}' may only connect to buffer, sink, or server nodes.`;
      }
    }
    return null;
  }, [nodes, edges]);

  const runSim = useCallback(async () => {
    setError(null);
    if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }
    if (chartInstance.current) { chartInstance.current.data.labels = []; chartInstance.current.data.datasets = []; chartInstance.current.update('none'); }
    const validationError = validateGraph();
    if (validationError) { setError(validationError); return; }
    const config = buildConfig();
    let id = sessionId;
    try {
      if (id) await fetch(`/api/networks/${id}`, { method: 'DELETE' });
      const res = await fetch('/api/networks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(config) });
      if (!res.ok) { const e = await res.json(); throw new Error(e.detail || res.statusText); }
      id = (await res.json()).id; setSessionId(id);
    } catch(e) { setError(e.message); return; }
    setStatus('running'); setStats([]); setSimTime(0); setEventCount(0); setServers({}); setBuffers({}); setStations({});
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/api/networks/${id}/stream`);
    wsRef.current = ws;
    ws.onopen = () => ws.send(JSON.stringify({ until: Number(until), stream_interval: streamInterval }));
    ws.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state' || msg.type === 'done' || msg.type === 'stopped') {
        setSimTime(msg.data.sim_time); setEventCount(msg.data.event_count);
        setStats(msg.stats || []); setServers(msg.data.servers || {}); setBuffers(msg.data.buffers || {}); setStations(msg.data.stations || {});
        pushChartData(msg.data, msg.stats);
        if (msg.type === 'done' || msg.type === 'stopped') setStatus(msg.data.status);
      } else if (msg.type === 'error') { setError(msg.message); setStatus('idle'); }
    };
    ws.onerror = () => { setError('WebSocket error'); setStatus('idle'); };
    ws.onclose = () => {
      if (wsRef.current === ws) wsRef.current = null;
      setStatus(s => s === 'running' ? 'idle' : s);
    };
  }, [buildConfig, sessionId, until, streamInterval, pushChartData, validateGraph]);

  const stopSim = useCallback(async () => {
    setError(null);
    if (!sessionId) {
      setStatus('paused');
      return;
    }
    try {
      const res = await fetch(`/api/networks/${sessionId}/stop`, { method: 'POST' });
      if (!res.ok) {
        const e = await res.json();
        throw new Error(e.detail || res.statusText);
      }
      const data = await res.json();
      setStatus(data.status || 'paused');
    } catch (e) {
      setError(e.message);
    }
  }, [sessionId]);

  const stepSim = useCallback(async () => {
    setError(null);
    const validationError = validateGraph();
    if (validationError) { setError(validationError); return; }
    let id = sessionId;
    if (!id) {
      try {
        const res = await fetch('/api/networks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(buildConfig()) });
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail); }
        id = (await res.json()).id; setSessionId(id);
      } catch(e) { setError(e.message); return; }
    }
    try {
      const res = await fetch(`/api/networks/${id}/step`, { method: 'POST' });
      if (!res.ok) { const e = await res.json(); throw new Error(e.detail); }
      const { state, stats: s } = await res.json();
      setSimTime(state.sim_time); setEventCount(state.event_count);
      setStats(s || []); setStatus(state.status); setServers(state.servers || {}); setBuffers(state.buffers || {}); setStations(state.stations || {});
      pushChartData(state, s);
    } catch(e) { setError(e.message); }
  }, [buildConfig, sessionId, pushChartData, validateGraph]);

  const resetSim = useCallback(async () => {
    if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }
    if (sessionId) { await fetch(`/api/networks/${sessionId}`, { method: 'DELETE' }); setSessionId(null); }
    setStatus('idle'); setSimTime(0); setEventCount(0); setStats([]); setError(null); setServers({}); setBuffers({}); setStations({});
    if (chartInstance.current) { chartInstance.current.data.labels = []; chartInstance.current.data.datasets = []; chartInstance.current.update('none'); }
  }, [sessionId]);

  const statusColor =
    status === 'running' ? '#22c55e' :
    status === 'paused' ? '#f59e0b' :
    status === 'done' ? '#3b82f6' :
    '#4a6180';
  const statusDot =
    status === 'running' ? '#4ade80' :
    status === 'paused' ? '#fbbf24' :
    status === 'done' ? '#60a5fa' :
    '#334155';

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%', background:'var(--bg-base)'}}>
      {showTemplateModal && <PresetTemplates onLoad={loadTemplate} />}
      {showPolicyModal && (
        <PolicyLibraryModal
          policies={customPolicies}
          onClose={() => setShowPolicyModal(false)}
          onUpload={uploadPolicy}
          uploading={policyUploading}
          error={policyUploadError}
        />
      )}

      {/* Toolbar */}
      <div style={{display:'flex', alignItems:'center', gap:8, padding:'0 12px', height:48, background:'var(--bg-panel)', borderBottom:'1px solid var(--border)', flexShrink:0}}>
        {/* Brand */}
        <div style={{display:'flex', alignItems:'center', gap:8, marginRight:4}}>
          <div style={{width:28, height:28, borderRadius:7, background:'#1d4ed8', display:'flex', alignItems:'center', justifyContent:'center'}}>
            <Icons.Live size={13} />
          </div>
          <span style={{fontWeight:700, fontSize:13, letterSpacing:.3, color:'var(--text-primary)', fontFamily:'var(--mono)'}}>DES</span>
        </div>

        <button className="btn btn-template" onClick={() => setShowTemplateModal(true)} disabled={isLocked}>
          <Icons.Templates size={12} /> Templates
        </button>
        <button className="btn btn-template" onClick={() => { setPolicyUploadError(null); setShowPolicyModal(true); }}>
          <Icons.Upload size={12} /> Policies
        </button>
        <button className="btn btn-reset" onClick={undoLastChange} disabled={isLocked || !canUndo} title="Undo last canvas edit (Ctrl/Cmd+Z)">
          <Icons.Undo /> Undo
        </button>

        <div className="tb-divider" />

        {/* Sim params */}
        <div style={{display:'flex', alignItems:'center', gap:6}}>
          <label style={{fontSize:11, color:'var(--text-muted)', display:'flex', alignItems:'center', gap:5}}>
            Until
            <input type="number" min="1" step="1000" value={until} onChange={e => setUntil(e.target.value)}
              className="tb-input tb-number-input" style={{width:76}} />
          </label>
          <label style={{fontSize:11, color:'var(--text-muted)', display:'flex', alignItems:'center', gap:5}}>
            Warm-up
            <input type="number" min="0" step="100" value={warmUp} onChange={e => setWarmUp(e.target.value)}
              className="tb-input tb-number-input" style={{width:72}} />
          </label>
          <label style={{fontSize:11, color:'var(--text-muted)', display:'flex', alignItems:'center', gap:5}}>
            Interval
            <input type="number" min="0.1" max="2" step="0.1" value={streamInterval} onChange={e => setStreamInterval(Number(e.target.value))}
              className="tb-input tb-number-input" style={{width:72}} />
          </label>
          <label style={{fontSize:11, color:'var(--text-muted)', display:'flex', alignItems:'center', gap:5}}>
            <span style={{display:'inline-flex', alignItems:'center', gap:5}}>
              {selected?.type === 'server' ? 'Node Router' : 'Default Router'}
              <HelpTooltip
                text={selected?.type === 'server'
                  ? 'Overrides the network default for this server. It controls how the selected server chooses among multiple outgoing edges after service completes.'
                  : 'Network-wide routing policy used by servers unless a node-specific router override is set. It only matters when a server has more than one outgoing edge.'}
              />
            </span>
            <select value={toolbarRouter} onChange={handleToolbarRouterChange} className="tb-select" disabled={toolbarRouterDisabled} title={toolbarRouterTitle}>
              <option value="probabilistic">Probabilistic</option>
              <option value="round_robin">Round Robin</option>
              {selected?.type === 'server' && <option value="class_based">Class-Based</option>}
            </select>
          </label>
        </div>

        <div className="tb-divider" />

        {/* Controls */}
        <button className="btn btn-run"  onClick={runSim}  disabled={status === 'running'}><Icons.Play /> Run</button>
        <button className="btn btn-step" onClick={stepSim} disabled={status === 'running'}><Icons.Step /> Step</button>
        <button className="btn btn-stop" onClick={stopSim} disabled={status !== 'running'}><Icons.Stop /> Stop</button>
        <button className="btn btn-reset" onClick={resetSim}><Icons.Reset /> Reset</button>
        <button className="btn btn-reset" onClick={() => setIsLocked(v => !v)}>
          {isLocked ? <Icons.Unlock /> : <Icons.Lock />} {isLocked ? 'Unlock Canvas' : 'Lock Canvas'}
        </button>

        {/* Status */}
        <div style={{marginLeft:'auto', display:'flex', alignItems:'center', gap:12}}>
          <div style={{display:'flex', alignItems:'center', gap:12, fontSize:11, color:'var(--text-muted)', fontFamily:'var(--mono)'}}>
            <span>t=<span style={{color:'var(--text-primary)'}}>{simTime.toFixed(1)}</span></span>
            <span>ev=<span style={{color:'var(--text-primary)'}}>{eventCount}</span></span>
          </div>
          <div style={{display:'flex', alignItems:'center', gap:5}}>
            <div style={{width:6, height:6, borderRadius:'50%', background: statusDot, boxShadow: status === 'running' ? `0 0 6px ${statusDot}` : 'none'}} />
            <span style={{fontSize:11, fontWeight:700, color: statusColor, letterSpacing:.5, textTransform:'uppercase', fontFamily:'var(--mono)'}}>{status}</span>
          </div>
        </div>
      </div>

      {/* Error bar */}
      {error && (
        <div style={{background:'rgba(127,29,29,.6)', borderBottom:'1px solid rgba(239,68,68,.2)', padding:'6px 14px', fontSize:11, color:'#fca5a5', flexShrink:0}}>
          {error}
        </div>
      )}

      {/* Main workspace */}
      <div style={{display:'flex', flex:1, overflow:'hidden'}}>

        {/* Node palette */}
        <div style={{width:110, background:'var(--bg-panel)', borderRight:'1px solid var(--border)', display:'flex', flexDirection:'column', padding:10, gap:6, flexShrink:0}}>
          <div style={{fontSize:9, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:.8, fontWeight:700, marginBottom:2, padding:'0 2px'}}>Nodes</div>
          {[
            { type:'source', label:'Source', dot:'#f97316' },
            { type:'server', label:'Server', dot:'#22c55e' },
            { type:'buffer', label:'Buffer', dot:'#14b8a6' },
            { type:'station', label:'Station', dot:'#3b82f6' },
            { type:'sink',   label:'Sink',   dot:'#475569' },
          ].map(({ type, label, dot }) => (
            <div key={type} className="palette-item" draggable={!isLocked}
              style={isLocked ? {opacity:.45, cursor:'not-allowed'} : undefined}
              onDragStart={e => {
                if (isLocked) {
                  e.preventDefault();
                  return;
                }
                e.dataTransfer.setData('application/reactflow-type', type);
              }}>
              <div className="palette-dot" style={{background: dot}} />
              {label}
            </div>
          ))}
          <div style={{fontSize:9, color:'var(--text-muted)', textAlign:'center', marginTop:4, lineHeight:1.5, padding:'0 2px'}}>
            {isLocked ? 'Canvas locked' : 'Drag onto canvas'}
          </div>
        </div>

        {/* Canvas */}
        <div style={{flex:1, position:'relative'}} onDrop={onDrop} onDragOver={onDragOver}>
          <ReactFlow
            nodes={nodes} edges={edges}
            onNodesChange={onNodesChange} onEdgesChange={onEdgesChange}
            onConnect={onConnect} onNodeClick={onNodeClick}
            onNodeDragStart={onNodeDragStart}
            onNodeDragStop={onNodeDragStop}
            onEdgeClick={onEdgeClick} onPaneClick={onPaneClick}
            nodeTypes={nodeTypes} fitView
            nodesDraggable={!isLocked}
            nodesConnectable={!isLocked}
            elementsSelectable={true}
            deleteKeyCode={null}
            style={{background:'var(--bg-surface)'}}
          >
            <Background color="#1a2740" gap={24} size={1} />
            <Controls showInteractive={false} />
            <MiniMap nodeColor={n =>
              n.type==='source' ? '#f97316' :
              n.type==='server' ? '#22c55e' :
              n.type==='buffer' ? '#14b8a6' :
              n.type==='station' ? '#3b82f6' : '#475569'
            } style={{background:'var(--bg-panel)', border:'1px solid var(--border)', borderRadius:8}} />
          </ReactFlow>
        </div>

        {/* Properties panel */}
        <div style={{width:226, background:'var(--bg-panel)', borderLeft:'1px solid var(--border)', overflow:'hidden', flexShrink:0}}>
          <PropertiesPanel selected={selected} onUpdate={updateSelected} onDelete={deleteSelected} nodes={nodes} edges={edges} customPolicies={customPolicies} isLocked={isLocked} />
        </div>
      </div>

      {/* Metrics panel */}
      <div style={{height:180, display:'flex', flexDirection:'column', background:'var(--bg-panel)', borderTop:'1px solid var(--border)', flexShrink:0}}>
        {/* Tab bar */}
        <div style={{display:'flex', borderBottom:'1px solid var(--border)', flexShrink:0, padding:'0 4px'}}>
          {TABS.map(({ key, label, Icon: TabIcon }) => (
            <button key={key} onClick={() => setMetricsTab(key)} style={{
              display:'flex', alignItems:'center', gap:5,
              padding:'7px 12px', border:'none', borderBottom: metricsTab === key ? '2px solid var(--accent-blue)' : '2px solid transparent',
              background:'none', cursor:'pointer', fontSize:11, fontWeight:600, fontFamily:'Inter, sans-serif',
              color: metricsTab === key ? 'var(--text-primary)' : 'var(--text-muted)',
              transition:'color 150ms',
            }}>
              <TabIcon size={12} />
              {label}
            </button>
          ))}
        </div>
        {/* Tab content */}
        <div style={{flex:1, overflow:'hidden'}}>
          {metricsTab === 'live'   && <LiveMetricsPanel servers={servers} buffers={buffers} stations={stations} stats={stats} />}
          {metricsTab === 'stats'  && <div style={{height:'100%', overflowY:'auto'}}><StatsTable stats={stats} /></div>}
          {metricsTab === 'theory' && <TheoreticalComparison nodes={nodes} edges={edges} stats={stats} />}
          {metricsTab === 'chart'  && <QueueChart chartRef={chartRef} />}
        </div>
      </div>
    </div>
  );
}

function Root() {
  return <ReactFlowProvider><App /></ReactFlowProvider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
